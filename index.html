<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semak Nombor Kaunter</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b0f1a;
            --surface: #121829;
            --card: #1a2235;
            --border: #253047;
            --accent: #2563eb;
            --accent-h: #1d4ed8;
            --green: #10b981;
            --red: #ef4444;
            --yellow: #f59e0b;
            --text: #e2e8f0;
            --muted: #64748b;
            --mono: 'JetBrains Mono', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(37,99,235,0.18) 0%, transparent 70%);
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeDown .5s ease both;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(37,99,235,0.15);
            border: 1px solid rgba(37,99,235,0.35);
            color: #93c5fd;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 99px;
            margin-bottom: 18px;
        }

            .badge span {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: #3b82f6;
                display: inline-block;
                animation: pulse 2s infinite;
            }

        h1 {
            font-size: clamp(26px,5vw,40px);
            font-weight: 800;
            letter-spacing: -.03em;
            line-height: 1.15;
            color: #fff;
        }

            h1 em {
                font-style: normal;
                color: #60a5fa;
            }

        .subtitle {
            margin-top: 10px;
            color: var(--muted);
            font-size: 14px;
        }

        /* ── Card ── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 60px rgba(0,0,0,.45);
            animation: fadeUp .5s .1s ease both;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 16px;
        }

            .input-wrap svg {
                position: absolute;
                left: 14px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--muted);
                pointer-events: none;
            }

        input[type="text"] {
            width: 100%;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 14px 14px 14px 44px;
            font-family: var(--mono);
            font-size: 15px;
            color: var(--text);
            letter-spacing: .06em;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

            input[type="text"]::placeholder {
                color: var(--muted);
                letter-spacing: .04em;
            }

            input[type="text"]:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(37,99,235,.2);
            }

        button {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background .2s, transform .1s;
        }

            button:hover {
                background: var(--accent-h);
            }

            button:active {
                transform: scale(.98);
            }

            button:disabled {
                opacity: .5;
                cursor: not-allowed;
            }

        /* ── Spinner ── */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: none;
        }

        button.loading .spinner {
            display: block;
        }

        button.loading .btn-label {
            display: none;
        }

        /* ── Result ── */
        #result {
            margin-top: 24px;
            display: none;
            animation: fadeUp .35s ease both;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .status-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 17px;
        }

            .status-icon.ok {
                background: rgba(16,185,129,.15);
                color: var(--green);
            }

            .status-icon.err {
                background: rgba(239,68,68,.12);
                color: var(--red);
            }

        .result-title {
            font-weight: 700;
            font-size: 15px;
        }

        .result-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 1px;
        }

        /* Kaunter highlight box */
        .kaunter-box {
            background: linear-gradient(135deg, rgba(37,99,235,.18) 0%, rgba(99,102,241,.12) 100%);
            border: 1px solid rgba(99,102,241,.35);
            border-radius: 14px;
            padding: 20px 24px;
            text-align: center;
            margin-bottom: 16px;
        }

        .kaunter-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: #93c5fd;
            margin-bottom: 4px;
        }

        .kaunter-num {
            font-family: var(--mono);
            font-size: 48px;
            font-weight: 600;
            color: #fff;
            line-height: 1;
        }

        /* Info rows */
        .info-grid {
            display: grid;
            gap: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 16px;
            font-size: 13px;
        }

        .info-key {
            color: var(--muted);
            font-weight: 500;
        }

        .info-value {
            font-family: var(--mono);
            font-size: 12.5px;
            color: var(--text);
            font-weight: 600;
        }

        /* Error box */
        .error-box {
            background: rgba(239,68,68,.08);
            border: 1px solid rgba(239,68,68,.25);
            border-radius: 12px;
            padding: 16px;
            font-size: 14px;
            color: #fca5a5;
        }

        /* ── Footer ── */
        .footer {
            margin-top: 28px;
            font-size: 11px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 16px;
            animation: fadeUp .5s .2s ease both;
        }

            .footer span {
                display: flex;
                align-items: center;
                gap: 5px;
            }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--muted);
        }

        /* ── Animations ── */
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-16px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @keyframes pulse {
            0%,100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="badge"><span></span> Sistem Semakan Kaunter</div>
        <h1>Semak <em>Nombor Kaunter</em><br>Anda</h1>
        <p class="subtitle">Masukkan nombor IC untuk mengetahui kaunter yang ditetapkan.</p>
    </div>

    <div class="card">
        <label for="icInput">Nombor Kad Pengenalan (IC)</label>
        <div class="input-wrap">
            <!-- ID card icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <rect x="2" y="5" width="20" height="14" rx="2" />
                <circle cx="8" cy="12" r="2" />
                <path stroke-linecap="round" d="M13 10h4M13 14h3" />
            </svg>
            <input type="text" id="icInput" placeholder="cth: 900101-01-1234" maxlength="14" autocomplete="off" />
        </div>

        <button id="submitBtn" onclick="lookup()">
            <span class="btn-label">🔍 Semak Kaunter</span>
            <div class="spinner"></div>
        </button>

        <div id="result"></div>
    </div>

    <div class="footer">
        <span>
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>
            Data selamat &amp; terenkripsi
        </span>
        <div class="dot"></div>
        <span>Dikuasakan oleh Google Sheets</span>
    </div>

    <script>
  // ─────────────────────────────────────────────
  // ⚠️  REPLACE THIS WITH YOUR APPS SCRIPT URL
  // ─────────────────────────────────────────────
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyCpskd5kUtRa3ySIdmQiZn8oNTqlM4Z6fTbju6_gCnjM4B9ebAzrdSQYwGQc6W18OatQ/exec";

  const input  = document.getElementById("icInput");
  const btn    = document.getElementById("submitBtn");
  const result = document.getElementById("result");

  // Allow Enter key
  input.addEventListener("keydown", e => { if (e.key === "Enter") lookup(); });

  // Auto-format IC as user types (add dashes)
  input.addEventListener("input", () => {
    let v = input.value.replace(/[^0-9]/g, "");
    if (v.length > 6)  v = v.slice(0,6)  + "-" + v.slice(6);
    if (v.length > 9)  v = v.slice(0,9)  + "-" + v.slice(9);
    if (v.length > 14) v = v.slice(0,14);
    input.value = v;
  });

  async function lookup() {
    const ic = input.value.trim();
    if (!ic) { showError("Sila masukkan nombor IC anda."); return; }

    setLoading(true);
    result.style.display = "none";

    try {
      const url = `${APPS_SCRIPT_URL}?action=lookup&ic=${encodeURIComponent(ic)}`;
      const res  = await fetch(url);
      if (!res.ok) throw new Error("Respons pelayan tidak sah.");
      const data = await res.json();

      if (data.success) {
        showSuccess(data);
      } else {
        showError(data.message || "IC tidak dijumpai.");
      }
    } catch (err) {
      showError("Gagal menghubungi pelayan. Sila semak sambungan atau URL Apps Script.");
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on) {
    btn.disabled = on;
    btn.classList.toggle("loading", on);
  }

  function showSuccess(d) {
    // Extract just the counter number for big display
    const kaunterDisplay = d.kaunter || "—";

    result.innerHTML = `
      <div class="result-header">
        <div class="status-icon ok">✓</div>
        <div>
          <div class="result-title">Kaunter dijumpai!</div>
          <div class="result-sub">Sila pergi ke kaunter yang ditetapkan.</div>
        </div>
      </div>
      <div class="kaunter-box">
        <div class="kaunter-label">Nombor Kaunter Anda</div>
        <div class="kaunter-num">${escHtml(kaunterDisplay)}</div>
      </div>
      <div class="info-grid">
        <div class="info-row">
          <span class="info-key">Nombor IC</span>
          <span class="info-value">${escHtml(d.ic)}</span>
        </div>
        ${d.email ? `
        <div class="info-row">
          <span class="info-key">Emel</span>
          <span class="info-value">${escHtml(d.email)}</span>
        </div>` : ""}
        ${d.tarikh ? `
        <div class="info-row">
          <span class="info-key">Tarikh</span>
          <span class="info-value">${escHtml(d.tarikh)}</span>
        </div>` : ""}
      </div>`;
    result.style.display = "block";
  }

  function showError(msg) {
    result.innerHTML = `
      <div class="result-header">
        <div class="status-icon err">✕</div>
        <div>
          <div class="result-title">IC Tidak Dijumpai</div>
          <div class="result-sub">Semak semula nombor IC anda.</div>
        </div>
      </div>
      <div class="error-box">${escHtml(msg)}</div>`;
    result.style.display = "block";
  }

  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
    </script>
</body>

</html>
