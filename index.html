<!DOCTYPE html>
<html lang="ms" data-theme="dark" data-lang="ms">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semak Nombor Kaunter</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ── THEME VARIABLES ── */
        :root {
            --accent: #2563eb;
            --accent-h: #1d4ed8;
            --accent-g: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
            --mono: 'JetBrains Mono', monospace;
            --radius: 16px;
            --transition: .25s cubic-bezier(.4,0,.2,1);
        }

        [data-theme="dark"] {
            --bg: #080c14;
            --bg2: #0d1321;
            --surface: #111827;
            --card: #151e2e;
            --border: #1f2d42;
            --border2: #243346;
            --text: #e8edf5;
            --text2: #94a3b8;
            --text3: #64748b;
            --shadow: rgba(0,0,0,.6);
            --glow: rgba(37,99,235,.15);
        }

        [data-theme="light"] {
            --bg: #f0f4fb;
            --bg2: #e8eef8;
            --surface: #ffffff;
            --card: #ffffff;
            --border: #d1ddf0;
            --border2: #c0cfe8;
            --text: #0f172a;
            --text2: #475569;
            --text3: #94a3b8;
            --shadow: rgba(15,23,42,.12);
            --glow: rgba(37,99,235,.08);
        }

        /* ── BASE ── */
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Sora', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 20px 48px;
            transition: background var(--transition), color var(--transition);
        }

            /* Background mesh */
            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background: radial-gradient(ellipse 70% 40% at 20% 10%, var(--glow), transparent 60%), radial-gradient(ellipse 50% 30% at 80% 80%, rgba(99,102,241,.06), transparent 60%);
                pointer-events: none;
                z-index: 0;
            }

        /* ── TOP BAR ── */
        .topbar {
            width: 100%;
            max-width: 520px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            position: relative;
            z-index: 10;
        }

        /* Language switcher */
        .lang-switcher {
            display: flex;
            gap: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 99px;
            padding: 4px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .lang-btn {
            border: none;
            background: transparent;
            color: var(--text3);
            font-family: 'Sora', sans-serif;
            font-size: 11px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 99px;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
        }

            .lang-btn:hover {
                color: var(--text2);
            }

            .lang-btn.active {
                background: var(--accent);
                color: #fff;
                box-shadow: 0 2px 8px rgba(37,99,235,.35);
            }

        /* Theme toggle */
        .theme-toggle {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border);
            border-radius: 50%;
            background: var(--surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            transition: all var(--transition);
            box-shadow: 0 2px 8px var(--shadow);
        }

            .theme-toggle:hover {
                border-color: var(--accent);
                transform: rotate(20deg);
            }

        /* ── MAIN WRAPPER ── */
        .wrapper {
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            animation: fadeUp .55s ease both;
        }

        /* ── LOGO CONTAINER ── */
        .logo-container {
            width: 88px;
            height: 88px;
            border-radius: 24px;
            background: var(--card);
            border: 2px dashed var(--border2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-bottom: 24px;
            transition: border-color var(--transition), background var(--transition);
            cursor: default;
            position: relative;
            overflow: hidden;
        }

            .logo-container::after {
                content: '';
                position: absolute;
                inset: 0;
                background: linear-gradient(135deg, rgba(37,99,235,.06), transparent);
                border-radius: inherit;
            }

        .logo-icon {
            font-size: 28px;
            line-height: 1;
        }

        .logo-text {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--text3);
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: rgba(37,99,235,0.12);
            border: 1px solid rgba(37,99,235,0.28);
            color: #60a5fa;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 99px;
            margin-bottom: 16px;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3b82f6;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: clamp(24px,5vw,36px);
            font-weight: 800;
            letter-spacing: -.04em;
            line-height: 1.15;
            color: var(--text);
            transition: color var(--transition);
        }

            h1 em {
                font-style: normal;
                color: var(--accent-g);
            }

        .subtitle {
            margin-top: 10px;
            color: var(--text2);
            font-size: 13.5px;
            font-weight: 400;
            line-height: 1.6;
            transition: color var(--transition);
        }

        /* ── CARD ── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            box-shadow: 0 20px 60px var(--shadow), 0 0 0 1px rgba(255,255,255,.03);
            transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
        }

        /* ── INPUT ── */
        .field-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .09em;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 8px;
            transition: color var(--transition);
        }

        .input-wrap {
            position: relative;
            margin-bottom: 14px;
        }

            .input-wrap svg {
                position: absolute;
                left: 15px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--text3);
                pointer-events: none;
                transition: color var(--transition);
            }

        input[type="text"] {
            width: 100%;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 15px 15px 15px 46px;
            font-family: var(--mono);
            font-size: 15px;
            color: var(--text);
            letter-spacing: .07em;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition), background var(--transition), color var(--transition);
        }

            input[type="text"]::placeholder {
                color: var(--text3);
                letter-spacing: .04em;
            }

            input[type="text"]:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(37,99,235,.18);
            }

        /* ── BUTTON ── */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, #1e40af 100%);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            padding: 15px;
            font-family: 'Sora', sans-serif;
            font-size: 14.5px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity .2s, transform .15s, box-shadow .2s;
            box-shadow: 0 4px 20px rgba(37,99,235,.4);
            letter-spacing: .01em;
        }

            .submit-btn:hover {
                opacity: .92;
                box-shadow: 0 6px 28px rgba(37,99,235,.5);
            }

            .submit-btn:active {
                transform: scale(.98);
            }

            .submit-btn:disabled {
                opacity: .45;
                cursor: not-allowed;
            }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: none;
        }

        .submit-btn.loading .spinner {
            display: block;
        }

        .submit-btn.loading .btn-label {
            display: none;
        }

        /* ── RESULT ── */
        #result {
            margin-top: 22px;
            display: none;
            animation: fadeUp .35s ease both;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .status-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }

            .status-icon.ok {
                background: rgba(16,185,129,.15);
                color: var(--green);
            }

            .status-icon.err {
                background: rgba(239,68,68,.12);
                color: var(--red);
            }

        .result-title {
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
        }

        .result-sub {
            font-size: 12px;
            color: var(--text2);
            margin-top: 2px;
        }

        .kaunter-box {
            background: linear-gradient(135deg, rgba(37,99,235,.14) 0%, rgba(99,102,241,.08) 100%);
            border: 1px solid rgba(99,102,241,.3);
            border-radius: 18px;
            padding: 22px 24px;
            text-align: center;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }

            .kaunter-box::before {
                content: '';
                position: absolute;
                top: -30px;
                right: -30px;
                width: 100px;
                height: 100px;
                border-radius: 50%;
                background: rgba(99,102,241,.08);
            }

        .kaunter-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #93c5fd;
            margin-bottom: 6px;
        }

        .kaunter-num {
            font-family: var(--mono);
            font-size: 52px;
            font-weight: 600;
            color: #fff;
            line-height: 1;
            text-shadow: 0 2px 20px rgba(99,102,241,.4);
        }

        [data-theme="light"] .kaunter-num {
            color: #1e3a8a;
            text-shadow: none;
        }

        .info-grid {
            display: grid;
            gap: 8px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 13px;
            transition: background var(--transition), border-color var(--transition);
        }

        .info-key {
            color: var(--text2);
            font-weight: 500;
            font-size: 12.5px;
        }

        .info-value {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text);
            font-weight: 600;
            text-align: right;
            max-width: 60%;
            word-break: break-word;
        }

        .error-box {
            background: rgba(239,68,68,.07);
            border: 1px solid rgba(239,68,68,.22);
            border-radius: 12px;
            padding: 16px;
            font-size: 13.5px;
            color: #fca5a5;
            line-height: 1.5;
        }

        /* ── FOOTER ── */
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: var(--text3);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: color var(--transition);
        }

            .footer span {
                display: flex;
                align-items: center;
                gap: 5px;
            }

        .fdot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--text3);
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-12px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @keyframes pulse {
            0%,100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: .5;
                transform: scale(.8)
            }
        }
    </style>
</head>

        // ── TRANSLATIONS ──

            }

        let currentLang = 'ms';

        function setLang(lang) {
            currentLang = lang;
            document.documentElement.setAttribute('data-lang', lang);

            // Update lang buttons
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            const t = i18n[lang];

            // Update all data-i18n elements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key] !== undefined) el.innerHTML = t[key];
            });

            // Update placeholder
            const inp = document.getElementById('icInput');
            inp.placeholder = t.placeholder;

            // Re-render result if visible
            const result = document.getElementById('result');
            if (result.style.display !== 'none' && result._lastData) {
                if (result._lastData.success) showSuccess(result._lastData);
                else showError(result._lastData.message);
            }
        }

        // ── THEME ──
        let isDark = true;
        function toggleTheme() {
            isDark = !isDark;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            document.querySelector('.theme-toggle').textContent = isDark ? '🌙' : '☀️';
        }

        // ── IC AUTO-FORMAT ──
        const input = document.getElementById('icInput');
        input.addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });
        input.addEventListener('input', () => {
            let v = input.value.replace(/[^0-9]/g, '');
            if (v.length > 6) v = v.slice(0, 6) + '-' + v.slice(6);
            if (v.length > 9) v = v.slice(0, 9) + '-' + v.slice(9);
            if (v.length > 14) v = v.slice(0, 14);
            input.value = v;
        });

        // ── LOOKUP ──
        function lookup() {
            const ic = input.value.trim();
            const t = i18n[currentLang];
            if (!ic) { showError(t.errEmpty); return; }

            setLoading(true);
            const result = document.getElementById('result');
            result.style.display = 'none';

            const callbackName = 'cb_' + Date.now();
            const script = document.createElement('script');

            window[callbackName] = function (data) {
                delete window[callbackName];
                document.body.removeChild(script);
                setLoading(false);
                result._lastData = data;
                if (data.success) showSuccess(data);
                else showError(data.message || t.notFound);
            };

            script.onerror = function () {
                delete window[callbackName];
                document.body.removeChild(script);
                setLoading(false);
                showError(t.errServer);
            };

            script.src = `${APPS_SCRIPT_URL}?action=lookup&ic=${encodeURIComponent(ic)}&callback=${callbackName}`;
            document.body.appendChild(script);

            setTimeout(() => {
                if (window[callbackName]) window[callbackName]({ success: false, message: t.errTimeout });
            }, 10000);
        }

        function setLoading(on) {
            const btn = document.getElementById('submitBtn');
            btn.disabled = on;
            btn.classList.toggle('loading', on);
        }

        function showSuccess(d) {
            const t = i18n[currentLang];
            const result = document.getElementById('result');
            result.innerHTML = `
          <div class="result-header">
            <div class="status-icon ok">✓</div>
            <div>
              <div class="result-title">${escHtml(t.found)}</div>
              <div class="result-sub">${escHtml(t.foundSub)}</div>
            </div>
          </div>
          <div class="kaunter-box">
            <div class="kaunter-label">${escHtml(t.kaunterLbl)}</div>
            <div class="kaunter-num">${escHtml(d.kaunter)}</div>
          </div>
          <div class="info-grid">
            <div class="info-row">
              <span class="info-key">${escHtml(t.keyIC)}</span>
              <span class="info-value">${escHtml(d.ic)}</span>
            </div>
            ${d.nama ? `<div class="info-row"><span class="info-key">${escHtml(t.keyNama)}</span><span class="info-value">${escHtml(d.nama)}</span></div>` : ''}
            ${d.email ? `<div class="info-row"><span class="info-key">${escHtml(t.keyEmel)}</span><span class="info-value">${escHtml(d.email)}</span></div>` : ''}
          </div>`;
            result.style.display = 'block';
        }

        function showError(msg) {
            const t = i18n[currentLang];
            const result = document.getElementById('result');
            result.innerHTML = `
          <div class="result-header">
            <div class="status-icon err">✕</div>
            <div>
              <div class="result-title">${escHtml(t.notFound)}</div>
              <div class="result-sub">${escHtml(t.notFoundSub)}</div>
            </div>
          </div>
          <div class="error-box">${escHtml(msg)}</div>`;
            result.style.display = 'block';
        }

        function escHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Init placeholder
        document.getElementById('icInput').placeholder = i18n[currentLang].placeholder;
    </script>
</body>
</html>
